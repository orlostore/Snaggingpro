#:schema node_modules/wrangler/config-schema.json
# Minimal config. Cloudflare Pages reads bindings and secrets from the
# dashboard for production. This file is here only so `wrangler pages dev`
# works locally if you want to run the Functions against a local D1 / R2.
#
# Production bindings (set in Pages dashboard → Settings → Bindings):
#   DB     → D1 database snaggingpro
#   PHOTOS → R2 bucket snaggingpro-photos
#
# Production secret (Pages → Settings → Variables and secrets):
#   API_SECRET (Secret type)

name = "snaggingpro"
pages_build_output_dir = "dist"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "snaggingpro-photos"

[[d1_databases]]
binding = "DB"
database_name = "snaggingpro"
database_id = "70d1a6e4-ba43-477f-ac80-79d4200d7eec"
